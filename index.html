<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        
        .hero { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* --- הגדרות למחשב נייח (Desktop) --- */
        @media (min-width: 769px) {
            .hero { 
                background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('ibex.jpg'); 
            }
            .hero-content { 
                position: absolute;
                top: 50%;
                left: 18%; 
                transform: translateY(-50%);
                text-align: center; 
                max-width: 550px;
                display: flex;
                flex-direction: column;
                align-items: center; 
            }
            .hero-content h1 { font-size: 4.5rem; font-weight: 200; letter-spacing: 15px; margin-bottom: 5px; text-transform: uppercase; white-space: nowrap; }
            
            nav { 
                position: absolute; top: 40px; right: 18%; 
                display: flex; gap: 50px; 
            }
            .he-nav { display: block; font-size: 1.3rem; letter-spacing: 1px; }
            .en-nav { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        }

        /* --- הגדרות לנייד (Mobile) --- */
        @media (max-width: 768px) {
            .hero { 
                background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('ibex.jpg');
                align-items: center; 
                justify-content: flex-end; 
                padding-bottom: 40px;
            }
            
            nav { 
                position: absolute; 
                top: 25px; 
                left: 50%; 
                transform: translateX(-50%); 
                display: flex; 
                gap: 20px; 
                width: 95%; 
                justify-content: center;
                z-index: 10;
            }

            .he-nav { 
                display: block; 
                font-size: 1.1rem; 
                font-weight: 500;
                text-shadow: 2px 2px 8px rgba(0,0,0,1); 
            }
            .en-nav { 
                display: block; 
                font-size: 0.65rem; 
                color: rgba(255,255,255,1); 
                text-transform: uppercase; 
                letter-spacing: 1px; 
                margin-top: 3px;
                text-shadow: 1px 1px 5px rgba(0,0,0,1); 
            }

            .hero-content { 
                text-align: center; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                width: 100%;
                background: linear-gradient(transparent, rgba(0,0,0,0.8)); 
                padding: 40px 10px;
            }

            .hero-content h1 { 
                font-size: 2.2rem; 
                letter-spacing: 5px; 
                margin-bottom: 8px; 
                text-shadow: 2px 2px 10px rgba(0,0,0,1);
            }
            
            .hero-content p.sub-title { 
                font-size: 1rem; 
                letter-spacing: 3px; 
                color: #ffcc00; 
                font-weight: 500;
                text-shadow: 1px 1px 5px rgba(0,0,0,1);
            }

            .hero-content p.description { 
                font-size: 1.05rem; 
                padding: 0 25px; 
                color: #ffffff; 
                font-weight: 400; 
                text-shadow: 1px 1px 8px rgba(0,0,0,1); 
                line-height: 1.6;
            }
        }

        /* עיצוב כללי */
        .sub-title { font-size: 1.2rem; color: #c5a059; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 25px; }
        .description { font-size: 1.1rem; line-height: 1.8; color: #eee; font-weight: 300; margin-bottom: 30px; max-width: 450px; }

        .nav-link { text-decoration: none; color: #fff; transition: 0.4s; text-align: center; }
        .nav-link:hover { color: #ffcc00; transform: translateY(-2px); }

        /* כפתור ה-Admin הנסתר */
        .admin-trigger {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: rgba(255,255,255,0.15);
            text-decoration: none;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }
        .admin-trigger:hover { color: #c5a059; }
    </style>
</head>
<body>

    <section class="hero">
        <nav>
            <a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a>
            <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
            <a href="birds.html" class="nav-link"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
            <a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a>
        </nav>

        <div class="hero-content">
            <h1>SHLOMI TOVA</h1>
            <p class="sub-title">Wildlife Photography</p>
            <p class="description">
                מתעד את רגעי הקסם של הטבע הפראי בישראל דרך העדשה. 
                מתמחה בצילום בעלי חיים וציפורים בסביבתן הטבעית.
            </p>
        </div>

        <div onclick="goToAdmin()" class="admin-trigger"><i class="fas fa-lock"></i> Admin Area</div>
    </section>

    <script>
        function goToAdmin() {
            const pass = prompt("אנא הכנס סיסמת מנהל:");
            // הסיסמה כרגע היא 1234
            if (pass === "1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("סיסמה שגויה");
            }
        }
    </script>

</body>
</html>
