<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature & Landscape Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        .hero { height: 100vh; display: flex; flex-direction: column; background-size: cover; background-position: center center; position: relative; }

        /* ניווט */
        nav { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; gap: 15px; width: 95%; justify-content: center; z-index: 10; }
        .nav-link { text-decoration: none; color: #fff; text-align: center; transition: 0.3s; }
        .he-nav { display: block; font-size: 0.9rem; font-weight: 500; }
        .en-nav { display: block; font-size: 0.6rem; color: #aaa; text-transform: uppercase; }

        /* תוכן מרכזי */
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; }
        h1 { font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 10px; font-weight: 200; }
        .sub-title { font-size: 1rem; color: #c5a059; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        .description { font-size: 1rem; line-height: 1.6; color: #ccc; max-width: 500px; margin: 0 auto; }

        /* עיצוב כפתור הניהול */
        .admin-trigger { 
            position: absolute; 
            text-decoration: none; 
            cursor: pointer; 
            z-index: 1000; 
            transition: 0.3s;
            color: rgba(255,255,255,0.15); 
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .admin-trigger:hover { color: #c5a059; }

        /* --- התאמה למחשב --- */
        @media (min-width: 769px) {
            h1 { font-size: 4.5rem; letter-spacing: 15px; }
            nav { top: 40px; gap: 30px; }
            .he-nav { font-size: 1.1rem; }
            .admin-trigger { bottom: 20px; right: 20px; font-size: 0.75rem; } 
        }

        /* --- התאמה לאייפון --- */
        @media (max-width: 768px) {
            .admin-trigger { 
                bottom: 60px; /* הועלה קצת יותר למעלה כדי שלא יפריע */
                left: 20px; 
                font-size: 0.65rem; 
                background: rgba(255,255,255,0.05); 
                padding: 5px 10px;
                border-radius: 15px;
            }
        }
    </style>
</head>
<body>

    <section class="hero" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('ibex.jpg');">
        <nav>
            <a href="birds.html" class="nav-link"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
            <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
            <a href="astronomy.html" class="nav-link"><span class="he-nav">אסטרונומיה</span><span class="en-nav">Astronomy</span></a>
            <a href="landscapes.html" class="nav-link"><span class="he-nav">נוף</span><span class="en-nav">Landscapes</span></a>
            <a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a>
            <a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a>
        </nav>

        <div class="hero-content">
            <h1>SHLOMI TOVA</h1>
            <p class="sub-title">Nature, Landscape & Astro Photography</p>
            <p class="description">מתעד את רגעי הקסם של הטבע הפראי, נופים עוצרי נשימה וגרמי השמיים דרך העדשה.</p>
        </div>

        <div onclick="openAdmin()" class="admin-trigger">
            <i class="fas fa-lock"></i> <span>Admin</span>
        </div>
    </section>

    <script>
        function openAdmin() {
            const pass = prompt("אנא הכנס סיסמת מנהל:");
            if (pass === "1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("סיסמה שגויה");
            }
        }
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'l') openAdmin();
        });
    </script>
</body>
</html>
