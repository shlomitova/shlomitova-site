<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature & Wildlife Photography</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; overflow: hidden; }
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(5, 5, 5, 0.4); backdrop-filter: blur(5px);
            padding: 20px 0;
        }
        .nav-container { display: flex; justify-content: center; gap: 40px; }
        .nav-link { text-align: center; text-decoration: none; transition: 0.3s; }
        .nav-link span { display: block; letter-spacing: 2px; text-transform: uppercase; }
        .he-nav { font-size: 0.9rem; color: #fff; margin-bottom: 2px; }
        .en-nav { font-size: 0.65rem; color: #aaa; }
        .nav-link:hover .he-nav, .nav-link:hover .en-nav { color: #c5a059; }

        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.5)), url('_DSC4996-Edit-2.jpg') no-repeat center center;
            background-size: cover; display: flex; align-items: center; justify-content: flex-end;
        }
        .content-box {
            margin-right: 8%; padding: 45px; background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 400px;
        }
        h1 { font-size: 2.6rem; font-weight: 200; letter-spacing: 7px; margin: 0; text-transform: uppercase; }
        .gold-line { width: 50px; height: 1px; background: #c5a059; margin: 25px auto; }
        .subtitle { font-size: 0.9rem; letter-spacing: 3px; color: #aaa; text-transform: uppercase; }

        @media (max-width: 768px) {
            .hero { justify-content: center; align-items: flex-end; }
            .content-box { margin-right: 0; margin-bottom: 80px; width: 85%; }
            .nav-container { gap: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
            <a href="birds.html" class="nav-link"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
            <a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a>
        </div>
    </nav>
    <section class="hero">
        <div class="content-box">
            <h1>SHLOMI TOVA</h1>
            <div class="gold-line"></div>
            <p class="subtitle">Nature • Wildlife • Astrophotography</p>
        </div>
    </section>
</body>
</html>
