<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature & Wildlife Photography</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #000 url('_DSC4996-Edit-2.jpg') no-repeat center center fixed; background-size: cover; color: white; display: flex; align-items: center; justify-content: flex-end; text-align: center; overflow: hidden; }
        
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(20,20,20,0) 0%, rgba(0,0,0,0.8) 100%); z-index: 1; }
        .content { z-index: 2; padding: 40px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); backdrop-filter: blur(8px); border-radius: 4px; animation: fadeIn 2.5s; }
        h1 { font-size: 3.5rem; font-weight: 200; letter-spacing: 10px; margin: 0; text-transform: uppercase; }
        .sep { width: 50px; height: 1px; background: #d4af37; margin: 25px auto; }
        p { font-size: 1.1rem; letter-spacing: 3px; color: #aaa; text-transform: uppercase; margin-bottom: 30px; }
        .status { font-size: 0.9rem; color: #666; letter-spacing: 1px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { h1 { font-size: 2rem; letter-spacing: 5px; } }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="content">
        <h1>SHLOMI TOVA</h1>
        <div class="sep"></div>
        <p>Nature • Wildlife • Astrophotography</p>
        <div class="status">האתר החדש בבנייה • בקרוב נחשוף את גלריית הטבע המלאה</div>
    </div>
</body>
</html>
