<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature & Wildlife Photography</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; scroll-behavior: smooth; }
        
        /* תמונת שער (Hero) */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.5)), url('_DSC4996-Edit-2.jpg') no-repeat center center;
            background-size: cover; display: flex; align-items: center; justify-content: flex-end;
        }
        .content-box {
            margin-right: 8%; padding: 40px; background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 400px;
        }
        h1 { font-size: 2.5rem; font-weight: 200; letter-spacing: 6px; margin: 0; text-transform: uppercase; }
        .gold-line { width: 50px; height: 1px; background: #c5a059; margin: 20px auto; }
        p.subtitle { font-size: 0.9rem; letter-spacing: 3px; color: #aaa; text-transform: uppercase; }

        /* מבנה הגלריות */
        .gallery-section { padding: 100px 10%; background: #050505; border-top: 1px solid #1a1a1a; }
        .section-title { text-align: center; font-size: 2rem; letter-spacing: 5px; margin-bottom: 60px; color: #fff; font-weight: 200; text-transform: uppercase; }
        .section-title span { color: #c5a059; display: block; font-size: 0.8rem; margin-top: 10px; letter-spacing: 2px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 50px;
        }

        .gallery-item { overflow: hidden; margin-bottom: 20px; }
        .image-container { 
            position: relative; width: 100%; padding-top: 66.66%; 
            overflow: hidden; border-radius: 2px; background: #111;
        }
        .image-container img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transition: transform 0.8s ease;
        }
        .gallery-item:hover img { transform: scale(1.03); }
        
        .item-caption {
            margin-top: 15px; text-align: right; font-size: 1.1rem;
            color: #fff; letter-spacing: 1px; font-weight: 300;
        }
        .item-sub-caption { font-size: 0.85rem; color: #666; margin-top: 5px; display: block; }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            .hero { justify-content: center; }
            .content-box { margin-right: 0; width: 85%; }
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-section { padding: 60px 5%; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="content-box">
            <h1>SHLOMI TOVA</h1>
            <div class="gold-line"></div>
            <p class="subtitle">Nature • Wildlife • Astrophotography</p>
        </div>
    </section>

    <section id="featured" class="gallery-section">
        <h2 class="section-title">רגעים נבחרים<span>SELECTED MOMENTS</span></h2>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <div class="image-container">
                    <img src="_DSC4996-Edit-2.jpg" alt="יעל במצוקי המדבר">
                </div>
                <div class="item-caption">יעל במצוקי המדבר</div>
                <span class="item-sub-caption">מכתש רמון | Sony a7V</span>
            </div>
            
            </div>
    </section>

    </body>
</html>
