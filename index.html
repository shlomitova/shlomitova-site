<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; background: #000; 
            color: #fff; overflow: hidden; 
        }
        
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(5, 5, 5, 0.7); padding: 20px 0; backdrop-filter: blur(8px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .nav-container { display: flex; justify-content: center; gap: 40px; }
        .nav-link { text-align: center; text-decoration: none; transition: 0.3s; }
        .he-nav { display: block; font-size: 0.9rem; color: #ccc; }
        .en-nav { display: block; font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        .nav-link:hover .he-nav, .active .he-nav { color: #c5a059; }

        .hero { 
            height: 100vh; width: 100vw;
            /* contain מבטיח שהתמונה לא תיחתך לעולם */
            background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0) 100%), url('ibex.jpg') no-repeat center center; 
            background-size: contain; 
            display: flex; align-items: center; 
            justify-content: flex-end; /* בגלל ה-RTL, זה מצמיד לשמאל הפיזי */
            padding: 0 8%;
            box-sizing: border-box;
        }

        .hero-content { 
            max-width: 400px; 
            text-align: center; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .hero-content h1 { 
            font-size: 2.8rem; font-weight: 200; letter-spacing: 6px; margin: 0; 
            text-transform: uppercase; line-height: 1.1; color: #fff;
        }
        .hero-content p.subtitle { 
            font-size: 1rem; color: #c5a059; letter-spacing: 4px; 
            font-weight: 300; text-transform: uppercase; margin: 15px 0 20px 0; 
        }

        .gold-line { width: 40px; height: 1px; background: #c5a059; margin: 20px 0; }

        .about-text { 
            font-size: 1.05rem; line-height: 1.7; color: #ddd; font-weight: 300; 
            margin-bottom: 25px; text-shadow: 1px 1px 5px rgba(0,0,0,1);
        }

        .social-links { display: flex; gap: 20px; justify-content: center; }
        .social-links a { color: #fff; font-size: 1.3rem; transition: 0.3s; }
        .social-links a:hover { color: #c5a059; transform: translateY(-3px); }

        @media (max-width: 768px) {
            .hero { 
                justify-content: center; padding: 0 5%; 
                background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('ibex.jpg') no-repeat center center;
                background-size: cover;
            }
            .hero-content { max-width: 90%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-link active"><span class="he-nav">בית</span><span class="en-nav">Home</span></a>
            <a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a>
            <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
            <a href="birds.html" class="nav-link"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
            <a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>SHLOMI TOVA</h1>
            <p class="subtitle">WILDLIFE PHOTOGRAPHY</p>
            
            <div class="gold-line"></div>
            
            <div class="about-text">
                שמי שלומי טובה, צלם טבע המוקדש לתיעוד המפגשים הפראיים והנסתרים של חיות הבר בישראל. הצילום עבורי הוא דרך חיים וחיבור עמוק לטבע הסובב אותנו.
            </div>

            <div class="social-links">
                <a href="https://www.facebook.com/shlomi.tova" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/shlomitova" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/972549391375" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
            
            <div class="gold-line"></div>
        </div>
    </section>

</body>
</html>
