<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        
        .hero { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* הגדרות למחשב נייח בלבד (Desktop) */
        @media (min-width: 769px) {
            .hero { 
                /* כהות 0.6 ויישור לשמאל */
                background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('ibex.jpg'); 
                align-items: flex-start; 
                padding-left: 10%; 
            }
            .hero-content { text-align: left; } /* יישור שורות הטקסט לשמאל */
            nav { justify-content: flex-start; }
        }

        /* הגדרות לנייד בלבד (Mobile) */
        @media (max-width: 768px) {
            .hero { 
                /* כהות 0.2 ויישור למרכז */
                background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('ibex.jpg');
                align-items: center; 
                text-align: center;
            }
            .hero-content h1 { font-size: 2.2rem; letter-spacing: 6px; }
            .hero-content p { font-size: 0.8rem; letter-spacing: 3px; }
            nav { gap: 15px; flex-wrap: wrap; justify-content: center; }
        }

        /* עיצוב כללי לטקסט */
        .hero-content h1 { font-size: 3.5rem; font-weight: 200; letter-spacing: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .hero-content p { font-size: 1.1rem; color: #c5a059; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 40px; }

        nav { display: flex; gap: 40px; }
        .nav-link { text-decoration: none; color: #fff; transition: 0.4s; text-align: center; }
        .he-nav { display: block; font-size: 1rem; letter-spacing: 1px; }
        .en-nav { display: block; font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        .nav-link:hover { color: #c5a059; transform: translateY(-3px); }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>SHLOMI TOVA</h1>
            <p>Wildlife Photography</p>

                <a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a>
                <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
                <a href="birds.html" class="nav-link"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
