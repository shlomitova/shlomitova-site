<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shlomi Tova | Nature & Landscape Photography</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        .hero { height: 100vh; display: flex; flex-direction: column; background-size: cover; background-position: center center; position: relative; }

        /* ניווט משופר שמתאים גם לאייפון */
        nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-wrap: wrap; gap: 12px; width: 95%; justify-content: center; z-index: 100; 
        }
        .nav-link { text-decoration: none; color: #fff; text-align: center; transition: 0.3s; padding: 5px; }
        .he-nav { display: block; font-size: 0.85rem; font-weight: 500; text-shadow: 1px 1px 5px #000; }
        .en-nav { display: block; font-size: 0.55rem; color: #ccc; text-transform: uppercase; }
        
        /* עיצוב מיוחד לכפתור הניהול בתפריט */
        .admin-link .he-nav { color: #c5a059; }
        .admin-link:hover .he-nav { color: #fff; }

        /* תוכן מרכזי */
        .hero-content { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 90%; }
        h1 { font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 5px; font-weight: 200; text-shadow: 2px 2px 10px #000; }
        .sub-title { font-size: 0.9rem; color: #c5a059; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
        .description { font-size: 0.95rem; line-height: 1.6; color: #ddd; max-width: 500px; margin: 0 auto; text-shadow: 1px 1px 5px #000; }

        @media (min-width: 769px) {
            h1 { font-size: 4.5rem; letter-spacing: 15px; }
            nav { top: 40px; gap: 30px; }
            .he-nav { font-size: 1.1rem; }
            .hero-content { top: 50%; }
        }
    </style>
</head>
<body>

    <section class="hero" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('ibex.jpg');">
        <nav>
            <a href="birds.html" class="nav-link"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
            <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
            <a href="astronomy.html" class="nav-link"><span class="he-nav">אסטרונומיה</span><span class="en-nav">Astronomy</span></a>
            <a href="landscapes.html" class="nav-link"><span class="he-nav">נוף</span><span class="en-nav">Landscapes</span></a>
            <a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a>
            <a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a>
            <a href="#" class="nav-link admin-link" onclick="openAdmin(); return false;"><span class="he-nav">ניהול</span><span class="en-nav">Admin</span></a>
        </nav>

        <div class="hero-content">
            <h1>SHLOMI TOVA</h1>
            <p class="sub-title">Nature, Landscape & Astro Photography</p>
            <p class="description">מתעד את רגעי הקסם של הטבע הפראי, נופים עוצרי נשימה וגרמי השמיים דרך העדשה.</p>
        </div>
    </section>

    <script>
        function openAdmin() {
            const pass = prompt("אנא הכנס סיסמת מנהל:");
            if (pass === "1234") {
                window.location.href = "admin.html";
            } else if (pass !== null) {
                alert("סיסמה שגויה");
            }
        }
    </script>
</body>
</html>
