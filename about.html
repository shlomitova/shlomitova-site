<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        
        .close-page { 
            position: fixed; top: 30px; left: 40px; 
            color: #fff; font-size: 50px; text-decoration: none; z-index: 1100; transition: 0.3s; 
        }
        .close-page:hover { color: #c5a059; transform: scale(1.1); }

        .about-page { 
            height: 100vh; display: flex; align-items: center; 
            justify-content: flex-end; 
            padding: 5% 10%; 
            box-sizing: border-box;
            /* הכהות הופחתה בחצי (0.35) כדי שהתמונה תהיה חיה יותר */
            background: linear-gradient(to right, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 100%), url('common_kestrel.jpg') no-repeat right center; 
            background-size: cover; 
            border: 15px solid #000; /* מסגרת מעט דקה יותר */
        }

        .about-container { 
            background: rgba(10, 10, 10, 0.6); 
            padding: 45px; width: 100%; max-width: 420px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.15); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            outline: none;
        }

        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 5px; font-size: 2.1rem; }
        h2 span { display: block; font-size: 0.8rem; color: #c5a059; letter-spacing: 3px; margin-top: 10px; }
        
        .gold-line { width: 40px; height: 1px; background: #c5a059; margin: 25px auto; }

        .about-text { 
            font-size: 1.05rem; line-height: 1.8; color: #fff; 
            font-weight: 300; text-align: right; margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8); /* הוספתי צל לטקסט כדי שיבלוט על הרקע הבהיר יותר */
        }

        @media (max-width: 768px) {
            .about-page { justify-content: center; padding: 0 5%; background-position: center; border: none; }
            .about-container { max-width: 90%; padding: 30px; }
            .close-page { top: 20px; left: 20px; font-size: 35px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-page">&times;</a>

    <section class="about-page">
        <div class="about-container" id="about-box" tabindex="0">
            <h2>שלומי טובה<span>ABOUT ME</span></h2>
            <div class="gold-line"></div>
            
            <div class="about-text">
                <p>שמי שלומי טובה, צלם טבע המוקדש לתיעוד המפגשים הפראיים והנסתרים של חיות הבר בישראל. הצילום עבורי הוא דרך חיים וחיבור עמוק לטבע הסובב אותנו.</p>
                <p>התשוקה שלי לצילום טבע נובעת מתוך כבוד עצום לעולם החי והרצון לשמר את הרגעים הייחודיים והמרגשים ביותר בטבע המקומי.</p>
            </div>
            
            <div class="gold-line"></div>
        </div>
    </section>

    <script>
        window.addEventListener('DOMContentLoaded', () => document.getElementById('about-box').focus());
        window.addEventListener('keyup', (e) => { if (e.key === "Escape") window.location.href = "index.html"; });
    </script>
</body>
</html>
