<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; height: 100%; overflow: hidden; }
        .close-page { position: fixed; top: 30px; right: 40px; color: #fff; font-size: 45px; text-decoration: none; z-index: 1100; transition: 0.3s; }
        .close-page:hover { color: #c5a059; }
        .about-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('common_kestrel.jpg') no-repeat center center; background-size: cover; padding: 20px; }
        .about-container { max-width: 700px; text-align: center; background: rgba(10, 10, 10, 0.7); padding: 40px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); outline: none; }
        h1 { font-size: 2rem; letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
        h1 span { display: block; font-size: 0.8rem; color: #c5a059; margin-top: 10px; letter-spacing: 3px; }
        .about-content { line-height: 1.8; color: #ccc; margin-bottom: 30px; }
        .gold-line { width: 40px; height: 1px; background: #c5a059; margin: 20px auto; }
        .about-socials { display: flex; justify-content: center; gap: 25px; }
        .about-socials a { color: #fff; font-size: 1.3rem; transition: 0.3s; }
        .about-socials a:hover { color: #c5a059; }
    </style>
</head>
<body>
    <a href="index.html" class="close-page" title="Back home">&times;</a>
    <section class="about-page">
        <div class="about-container" id="about-content" tabindex="0">
            <h1>אודות<span>ABOUT</span></h1>
            <div class="gold-line"></div>
            <div class="about-content">
                אני שלומי, צלם טבע המוקדש לתיעוד המפגשים הפראיים והנסתרים של חיות הבר בישראל. הצילום עבורי הוא דרך חיים וחיבור עמוק לטבע הסובב אותנו.<br><br>
                I am Shlomi, a wildlife photographer dedicated to documenting the hidden and raw moments of Israel's natural world.
            </div>
            <div class="about-socials">
                <a href="https://www.facebook.com/shlomi.tova" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/shlomitova" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/972549991171" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </section>
    <script>
        window.addEventListener('DOMContentLoaded', () => document.getElementById('about-content').focus());
        window.addEventListener('keyup', (e) => { if (e.key === "Escape") window.location.href = "index.html"; });
    </script>
</body>
</html>
