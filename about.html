<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        
        /* כפתור סגירה */
        .close-page { 
            position: fixed; top: 30px; left: 40px; 
            color: #fff; font-size: 40px; text-decoration: none; z-index: 1000; transition: 0.3s; 
        }
        .close-page:hover { color: #c5a059; transform: scale(1.1); }

        .about-page { 
            height: 100vh; display: flex; align-items: center; 
            justify-content: flex-start; /* בנייח הטקסט יהיה בצד ימין (RTL) */
            padding: 0 10%; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('common_kestrel.jpg') no-repeat center center; 
            background-size: cover;
        }

        /* תיבת התוכן בסגנון דף הבית */
        .about-container { 
            background: rgba(0, 0, 0, 0.75); 
            padding: 50px; 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid rgba(197, 160, 89, 0.3); /* מסגרת זהב עדינה */
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 5px; font-size: 2.5rem; color: #fff; text-transform: uppercase; }
        h2 span { display: block; font-size: 0.9rem; color: #c5a059; letter-spacing: 3px; margin-top: 10px; }
        
        .gold-line { width: 50px; height: 1px; background: #c5a059; margin: 25px 0; }

        .about-text { font-size: 1.1rem; line-height: 1.8; color: #eee; font-weight: 300; }
        .about-text p { margin-bottom: 20px; }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            .about-page { justify-content: center; padding: 0 5%; background-position: center; }
            .about-container { 
                max-width: 90%; 
                padding: 35px 25px; 
                margin-top: 50px; /* מקום לתפריט הניווט אם קיים */
                background: rgba(0, 0, 0, 0.85); 
            }
            h2 { font-size: 2rem; }
            .about-text { font-size: 1rem; }
            .close-page { top: 20px; left: 20px; font-size: 30px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-page">&times;</a>

    <section class="about-page">
        <div class="about-container">
            <h2>אודות<span>ABOUT ME</span></h2>
            <div class="gold-line"></div>
            
            <div class="about-text">
                <p>שלומי טובה, צלם טבע וחיות בר, מתמחה בתיעוד רגעים נדירים מהסביבה הטבעית של ישראל.</p>
                <p>הצילום עבורי הוא דרך חיים, המאפשרת לחשוף את היופי הפראי והשקט של הטבע דרך העדשה, תוך שמירה על כבוד לבעלי החיים וסביבתם.</p>
            </div>
            
            <div class="gold-line"></div>
        </div>
    </section>

</body>
</html>
