<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; }
        nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.9); padding: 15px 0; border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        .nav-container { display: flex; justify-content: center; gap: 35px; }
        .nav-link { text-align: center; text-decoration: none; transition: 0.3s; }
        .he-nav { display: block; font-size: 0.8rem; color: #aaa; }
        .en-nav { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover .he-nav, .active .he-nav { color: #c5a059; }
        .gallery-section { padding: 120px 10% 60px; }
        .section-title { text-align: center; font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 60px; font-weight: 200; text-transform: uppercase; }
        .section-title span { display: block; font-size: 0.85rem; color: #c5a059; margin-top: 12px; letter-spacing: 3px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .gallery-item { cursor: pointer; }
        .image-container { position: relative; width: 100%; padding-top: 66.6%; overflow: hidden; background: #111; }
        .image-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .item-caption { margin-top: 15px; text-align: right; }
        .cap-he { display: block; font-size: 1.1rem; }
        .cap-en { display: block; font-size: 0.8rem; color: #c5a059; }
        .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>
    <nav><div class="nav-container"><a href="index.html" class="nav-link"><span class="he-nav">בית</span><span class="en-nav">Home</span></a><a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a><a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a><a href="birds.html" class="nav-link active"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a><a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a></div></nav>
    <section class="gallery-section">
        <h1 class="section-title">ציפורים<span>BIRDS</span></h1>
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox(this)"><div class="image-container"><img src="common_kestrel.jpg"></div><div class="item-caption"><span class="cap-he">בז מצוי</span><span class="cap-en">Common Kestrel</span></div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><div class="image-container"><img src="male_montagus_harrier.jpg"></div><div class="item-caption"><span class="cap-he">זרוע שדות</span><span class="cap-en">Montagu's Harrier</span></div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><div class="image-container"><img src="white_fronted_goose.jpg"></div><div class="item-caption"><span class="cap-he">אווז לבן-מצח</span><span class="cap-en">White-fronted Goose</span></div></div>
            <div class="gallery-item" onclick="openLightbox(this)"><div class="image-container"><img src="male_hen_harrier.jpg"></div><div class="item-caption"><span class="cap-he">זרוע תכול</span><span class="cap-en">Hen Harrier</span></div></div>
        </div>
    </section>
    <div id="lightbox" class="lightbox" onclick="this.classList.remove('active')"><img id="lightbox-img"></div>
    <script>
        function openLightbox(el) { document.getElementById('lightbox-img').src = el.querySelector('img').src; document.getElementById('lightbox').classList.add('active'); }
    </script>
</body>
</html>
