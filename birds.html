<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        
        .close-page { 
            position: fixed; top: 30px; left: 40px; 
            color: #fff; font-size: 50px; text-decoration: none; z-index: 1100; transition: 0.3s; 
        }
        .close-page:hover { color: #c5a059; transform: scale(1.1); }

        .birds-page { 
            height: 100vh; display: flex; align-items: center; 
            justify-content: flex-end; 
            padding: 5% 10%; 
            box-sizing: border-box;
            /* כאן שמתי תמונה ייחודית לדף ציפורים - golden_eagle.jpg */
            background: linear-gradient(to right, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 100%), url('golden_eagle.jpg') no-repeat right center; 
            background-size: cover; 
            border: 15px solid #000;
        }

        .birds-container { 
            background: rgba(10, 10, 10, 0.65); 
            padding: 40px; width: 100%; max-width: 450px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.15); 
            backdrop-filter: blur(12px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            outline: none;
        }

        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 5px; font-size: 2.1rem; }
        h2 span { display: block; font-size: 0.8rem; color: #c5a059; letter-spacing: 3px; margin-top: 10px; }
        
        .gold-line { width: 40px; height: 1px; background: #c5a059; margin: 20px auto; }

        /* הגדרות לטקסט ולתמונות הקטנות */
        .birds-text { font-size: 1rem; line-height: 1.6; color: #fff; font-weight: 300; text-align: right; direction: rtl; }
        .bird-small-gallery { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; text-align: left; direction: ltr; }
        .bird-entry { font-size: 0.9rem; color: #ccc; }
        .bird-entry b { color: #fff; }

        @media (max-width: 768px) {
            .birds-page { justify-content: center; padding: 0 5%; background-position: center; border: none; }
            .birds-container { max-width: 90%; padding: 30px; }
            .close-page { top: 20px; left: 20px; font-size: 35px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-page">&times;</a>

    <section class="birds-page">
        <div class="birds-container" id="birds-box" tabindex="0">
            <h2>ציפורים<span>BIRDS</span></h2>
            <div class="gold-line"></div>
            
            <div class="birds-text">
                <p>מבחר רגעים מהחיים הפראיים של ציפורי ישראל.</p>
                <div class="gold-line" style="opacity: 0.2; width: 30px;"></div>
                
                <div class="bird-small-gallery">
                    <p class="bird-entry"><b>Hen Harrier</b> | זרון תכול</p>
                    <p class="bird-entry"><b>White-fronted Goose</b> | אווז לבן-מצח</p>
                    <p class="bird-entry"><b>Montagu's Harrier</b> | זרון שדות</p>
                    <p class="bird-entry"><b>Common Kestrel</b> | בז מצוי</p>
                </div>
            </div>
            
            <div class="gold-line"></div>
        </div>
    </section>

    <script>
        window.addEventListener('DOMContentLoaded', () => document.getElementById('birds-box').focus());
        window.addEventListener('keyup', (e) => { if (e.key === "Escape") window.location.href = "index.html"; });
    </script>
</body>
</html>
