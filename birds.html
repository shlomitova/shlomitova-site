<script>
    const JSON_FILE = 'birds.json'; // תשנה לפי שם הדף (mammals.json וכו')

    async function loadGallery() {
        try {
            const response = await fetch(JSON_FILE + '?t=' + new Date().getTime());
            const data = await response.json();
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = ''; 
            data.forEach(item => {
                grid.innerHTML += `
                    <div class="gallery-item" onclick="openLightboxManual('${item.src}')">
                        <div class="image-container"><img src="${item.src}"></div>
                        <div class="item-caption">
                            <span class="cap-he">${item.titleHe}</span>
                            <span class="cap-en">${item.titleEn}</span>
                        </div>
                    </div>`;
            });
        } catch (err) { console.error(err); }
    }

    function openLightboxManual(src) { 
        const lb = document.getElementById('lightbox');
        document.getElementById('lightbox-img').src = src; 
        lb.classList.add('active'); 
        document.body.style.overflow = 'hidden'; 
    }
    
    function closeLightbox() { 
        const lb = document.getElementById('lightbox');
        if (lb) {
            lb.classList.remove('active'); 
            document.body.style.overflow = 'auto';
        }
    }

    // --- המנגנון הכי חזק ל-ESC ---
    // אנחנו משתמשים ב-Capture (true) כדי לתפוס את המקש לפני שכל אלמנט אחר באתר נוגע בו
    window.addEventListener('keydown', function(e) {
        if (e.key === "Escape" || e.keyCode === 27) {
            e.preventDefault(); // מונע מהדפדפן לעשות פעולות אחרות
            
            const lightbox = document.getElementById('lightbox');
            
            // בדיקה אם הלייטבוקס פתוח
            if (lightbox && lightbox.classList.contains('active')) {
                closeLightbox();
                console.log("Lightbox closed via ESC");
            } else {
                // אם הוא סגור - עוברים לדף הבית מיד
                console.log("Redirecting to home via ESC");
                window.location.href = "index.html";
            }
        }
    }, true); // ה-true כאן הוא קריטי!

    loadGallery();
</script>
