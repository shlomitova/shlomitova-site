<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; }
        
        /* כפתור ה-X הקבוע - נייח בלבד */
        @media (min-width: 769px) {
            .close-page { 
                position: fixed; top: 25px; left: 40px; 
                color: #fff; font-size: 40px; text-decoration: none; z-index: 3000; 
                transition: 0.3s; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            }
            .close-page:hover { color: #c5a059; transform: scale(1.1); }
        }

        /* ניווט */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            background: rgba(5, 5, 5, 0.9); padding: 15px 0; border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); 
        }
        .nav-container { display: flex; justify-content: center; gap: 35px; }
        .nav-link { text-align: center; text-decoration: none; transition: 0.3s; }
        .he-nav { display: block; font-size: 0.8rem; color: #aaa; }
        .en-nav { display: block; font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover .he-nav, .active .he-nav { color: #c5a059; }

        /* גלריה */
        .gallery-section { padding: 120px 10% 60px; }
        .section-title { text-align: center; font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 60px; font-weight: 200; text-transform: uppercase; }
        .section-title span { display: block; font-size: 0.85rem; color: #c5a059; margin-top: 12px; letter-spacing: 3px; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .gallery-item { cursor: pointer; transition: 0.3s; }
        
        .image-container { 
            position: relative; width: 100%; height: 250px; 
            overflow: hidden; background: #111; border: 1px solid #222; 
        }
        .image-container img { 
            width: 100%; height: 100%; object-fit: cover; transition: 0.6s; 
        }
        .gallery-item:hover img { transform: scale(1.03); }
        
        .item-caption { margin-top: 15px; text-align: right; }
        .cap-he { display: block; font-size: 1.1rem; font-weight: 300; }
        .cap-en { display: block; font-size: 0.8rem; color: #c5a059; letter-spacing: 1px; }

        /* לייטבוקס */
        .lightbox { 
            display: none; position: fixed; z-index: 2000; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            align-items: center; justify-content: center; 
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border: 1px solid #333; }
        .close-lightbox { position: absolute; top: 30px; right: 40px; color: #fff; font-size: 50px; cursor: pointer; }

        @media (max-width: 768px) {
            .close-page { display: none; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-page">&times;</a>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-link"><span class="he-nav">בית</span><span class="en-nav">Home</span></a>
            <a href="about.html" class="nav-link"><span class="he-nav">אודות</span><span class="en-nav">About</span></a>
            <a href="mammals.html" class="nav-link"><span class="he-nav">יונקים</span><span class="en-nav">Mammals</span></a>
            <a href="birds.html" class="nav-link active"><span class="he-nav">ציפורים</span><span class="en-nav">Birds</span></a>
            <a href="contact.html" class="nav-link"><span class="he-nav">צור קשר</span><span class="en-nav">Contact</span></a>
        </div>
    </nav>

    <section class="gallery-section">
        <h1 class="section-title">ציפורים<span>BIRDS</span></h1>
        
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-container"><img src="common_kestrel.jpg"></div>
                <div class="item-caption"><span class="cap-he">בז מצוי</span><span class="cap-en">Common Kestrel</span></div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-container"><img src="male_montagus_harrier.jpg"></div>
                <div class="item-caption"><span class="cap-he">זרון שדות</span><span class="cap-en">Montagu's Harrier</span></div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-container"><img src="white_fronted_goose.jpg"></div>
                <div class="item-caption"><span class="cap-he">אווז לבן-מצח</span><span class="cap-en">White-fronted Goose</span></div>
            </div>

            <div class="gallery-item" onclick="openLightbox(this)">
                <div class="image-container"><img src="male_hen_harrier.jpg"></div>
                <div class="item-caption"><span class="cap-he">זרוע תכול</span><span class="cap-en">Hen Harrier</span></div>
            </div>
        </div>
    </section>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" onclick="event.stopPropagation()">
    </div>

    <script>
        function openLightbox(el) {
            const img = el.querySelector('img');
            document.getElementById('lightbox-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                const lightbox = document.getElementById('lightbox');
                if (lightbox.classList.contains('active')) {
                    closeLightbox();
                } else if (window.innerWidth > 768) {
                    window.location.href = "index.html";
                }
            }
        }, true);
    </script>
</body>
</html>
