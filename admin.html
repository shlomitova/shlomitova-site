<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול אתר | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #050505; --card: #111; --border: #222; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .admin-header h1 { font-weight: 200; font-size: 1.5rem; margin: 0; }
        .admin-header h1 i { color: var(--gold); margin-left: 10px; }
        .back-link { text-decoration: none; color: #666; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: #fff; }

        .tabs { display: flex; gap: 5px; margin-bottom: 25px; }
        .tab { background: #1a1a1a; border: none; color: #aaa; padding: 12px 25px; cursor: pointer; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }

        .admin-container { max-width: 900px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 40px; }

        /* אזור גרירה משופר */
        .drop-zone { 
            border: 2px dashed #333; padding: 60px; text-align: center; 
            cursor: pointer; transition: 0.3s; margin-bottom: 30px; 
            position: relative;
        }
        .drop-zone.drag-over { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); }
        .drop-zone i { font-size: 3.5rem; color: var(--gold); margin-bottom: 15px; }
        .drop-zone p { margin: 10px 0 0; color: #aaa; pointer-events: none; }

        .form-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        label { color: var(--gold); font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background: #1a1a1a; border: 1px solid #333; padding: 12px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--gold); }

        .submit-btn { background: var(--gold); color: #000; border: none; padding: 18px; font-weight: bold; font-size: 1rem; cursor: pointer; width: 100%; transition: 0.3s; }
        .submit-btn:hover { background: #e2be7e; }
        
        #status { text-align: center; margin-top: 25px; padding: 15px; display: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> חזרה לאתר</a>
        <h1>פאנל ניהול <i class="fas fa-camera"></i></h1>
    </div>

    <div class="tabs">
        <button class="tab active">העלאת תמונות</button>
        <button class="tab">ניהול גלריה</button>
    </div>

    <div class="admin-container">
        <div class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <p id="fileNameDisplay">גרור תמונה לכאן או לחץ לבחירה</p>
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>קטגוריה</label>
                <select id="category">
                    <option value="birds.json">ציפורים (Birds)</option>
                    <option value="mammals.json">יונקים (Mammals)</option>
                </select>
            </div>
            <div class="form-group">
                <label>כותרת בעברית</label>
                <input type="text" id="titleHe" placeholder="למשל: בז מצוי">
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label>Title in English</label>
            <input type="text" id="titleEn" placeholder="e.g. Common Kestrel">
        </div>

        <button class="submit-btn" onclick="startUpload()">העלה תמונה לאתר</button>
        <div id="status"></div>
    </div>

    <script>
        // --- הגדרות ---
        const REPO_OWNER = "shlomitova"; 
        const REPO_NAME = "shlomitova-site";

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const status = document.getElementById('status');
        let selectedFile = null;

        // --- טיפול בבחירת קובץ ---
        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) handleFileSelect(e.target.files[0]);
        };

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]);
        };

        function handleFileSelect(file) {
            selectedFile = file;
            fileNameDisplay.innerText = "קובץ נבחר: " + file.name;
            fileNameDisplay.style.color = "var(--gold)";
        }

        // --- פונקציות עזר לעברית (מניעת ג'יבריש) ---
        function utf8_to_b64(str) {
            return window.btoa(unescape(encodeURIComponent(str)));
        }

        function b64_to_utf8(str) {
            return decodeURIComponent(escape(window.atob(str)));
        }

        // --- תהליך העלאה ---
        async function startUpload() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt("אנא הכנס את ה-GitHub Token שלך (ghp_...):");
                if (token) localStorage.setItem('gh_token', token); else return;
            }

            const tHe = document.getElementById('titleHe').value;
            const tEn = document.getElementById('titleEn').value;
            const catFile = document.getElementById('category').value;

            if (!selectedFile || !tHe) { alert("חובה לבחור תמונה ולכתוב כותרת בעברית!"); return; }

            status.style.display = "block";
            status.innerText = "מעלה תמונה... אל תסגור את הדף";
            status.style.background = "#333"; status.style.color = "var(--gold)";

            const reader = new FileReader();
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];
                const fileName = selectedFile.name.replace(/\s+/g, '_');

                try {
                    // 1. העלאת התמונה ל-GitHub
                    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${fileName}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}` },
                        body: JSON.stringify({ message: `Add image: ${fileName}`, content: base64Image })
                    });

                    // 2. משיכת ה-JSON הקיים
                    const resJson = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    
                    if (!resJson.ok) throw new Error("קובץ ה-JSON לא נמצא ב-GitHub. וודא שיצרת קובץ בשם " + catFile);
                    
                    const jsonFileData = await resJson.json();
                    const currentImages = JSON.parse(b64_to_utf8(jsonFileData.content));
                    
                    // 3. הוספת התמונה החדשה לרשימה
                    currentImages.push({ src: fileName, titleHe: tHe, titleEn: tEn });

                    // 4. העלאת ה-JSON המעודכן (עם תמיכה בעברית)
                    const updatedContent = utf8_to_b64(JSON.stringify(currentImages, null, 2));

                    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}` },
                        body: JSON.stringify({ 
                            message: `Update ${catFile} list`, 
                            content: updatedContent, 
                            sha: jsonFileData.sha 
                        })
                    });

                    status.innerText = "הצלחה! התמונה והעברית נשמרו. האתר יתעדכן תוך דקה.";
                    status.style.background = "#155724"; status.style.color = "#d4edda";
                    
                    // איפוס טופס
                    document.getElementById('titleHe').value = "";
                    document.getElementById('titleEn').value = "";
                    fileNameDisplay.innerText = "גרור תמונה לכאן או לחץ לבחירה";
                    selectedFile = null;

                } catch (e) {
                    status.innerText = "שגיאה: " + e.message;
                    status.style.background = "#721c24"; status.style.color = "#f8d7da";
                }
            };
            reader.readAsDataURL(selectedFile);
        }
    </script>
</body>
</html>
