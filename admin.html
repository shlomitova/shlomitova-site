<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול אתר | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #050505; --card: #111; --border: #222; --danger: #ff4444; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .admin-header h1 { font-weight: 200; font-size: 1.5rem; margin: 0; }
        .admin-header h1 i { color: var(--gold); margin-left: 10px; }
        .back-link { text-decoration: none; color: #666; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: #fff; }

        .tabs { display: flex; gap: 5px; margin-bottom: 25px; }
        .tab { background: #1a1a1a; border: none; color: #aaa; padding: 12px 25px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; border-radius: 4px 4px 0 0; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }

        .admin-container { max-width: 900px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .page { display: none; }
        .page.active { display: block; }

        /* אזור העלאה */
        .drop-zone { border: 2px dashed #333; padding: 60px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 30px; position: relative; }
        .drop-zone.drag-over { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); }
        .drop-zone i { font-size: 3.5rem; color: var(--gold); margin-bottom: 15px; }
        .drop-zone p { color: #aaa; pointer-events: none; }
        
        .form-row { display: flex; gap: 20px; margin-bottom: 25px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        label { color: var(--gold); font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background: #1a1a1a; border: 1px solid #333; padding: 12px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }

        .submit-btn { background: var(--gold); color: #000; border: none; padding: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .submit-btn:hover { background: #e2be7e; transform: translateY(-2px); }
        
        /* ניהול רשימה */
        .image-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid #222; background: #161616; margin-bottom: 10px; border-radius: 4px; }
        .image-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; margin-left: 15px; border: 1px solid #333; }
        .image-info { flex-grow: 1; text-align: right; }
        .delete-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .delete-btn:hover { background: var(--danger); color: #fff; }

        #status { text-align: center; margin-top: 25px; padding: 15px; display: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> חזרה לאתר</a>
        <h1>פאנל ניהול <i class="fas fa-camera"></i></h1>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showPage(event, 'upload')">העלאת תמונות</button>
        <button class="tab" onclick="showPage(event, 'manage'); loadGalleryForManage();">ניהול גלריה (מחיקה)</button>
    </div>

    <div class="admin-container">
        <div id="uploadPage" class="page active">
            <div class="drop-zone" id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="fileNameDisplay">גרור תמונה לכאן או לחץ לבחירה</p>
                <input type="file" id="fileInput" style="display: none;" accept="image/*">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>קטגוריה</label>
                    <select id="category">
                        <option value="birds.json">ציפורים (Birds)</option>
                        <option value="mammals.json">יונקים (Mammals)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>כותרת בעברית</label>
                    <input type="text" id="titleHe" placeholder="למשל: בז מצוי">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label>Title in English</label>
                <input type="text" id="titleEn" placeholder="e.g. Common Kestrel">
            </div>
            <button class="submit-btn" onclick="startUpload()">העלה תמונה לאתר</button>
        </div>

        <div id="managePage" class="page">
            <div class="form-group" style="margin-bottom: 20px;">
                <label>בחר קטגוריה לצפייה ומחיקה</label>
                <select id="manageCategory" onchange="loadGalleryForManage()">
                    <option value="birds.json">ציפורים (Birds)</option>
                    <option value="mammals.json">יונקים (Mammals)</option>
                </select>
            </div>
            <div id="imageList" class="image-list">
                </div>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const REPO_OWNER = "shlomitova"; 
        const REPO_NAME = "shlomitova-site";
        let selectedFile = null;

        // עזרי קידוד למניעת ג'יבריש
        const utf8_to_b64 = (str) => window.btoa(unescape(encodeURIComponent(str)));
        const b64_to_utf8 = (str) => decodeURIComponent(escape(window.atob(str)));

        // ניווט
        function showPage(e, pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(pageId + 'Page').classList.add('active');
            e.currentTarget.classList.add('active');
            document.getElementById('status').style.display = 'none';
        }

        // בחירת קובץ וגרירה
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => { if (e.target.files.length > 0) handleFileSelect(e.target.files[0]); };
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]); };

        function handleFileSelect(file) {
            selectedFile = file;
            document.getElementById('fileNameDisplay').innerText = "קובץ נבחר: " + file.name;
            document.getElementById('fileNameDisplay').style.color = "var(--gold)";
        }

        // טעינת רשימה למחיקה
        async function loadGalleryForManage() {
            const catFile = document.getElementById('manageCategory').value;
            const listDiv = document.getElementById('imageList');
            listDiv.innerHTML = "<p style='text-align:center;'>טוען תמונות מהשרת...</p>";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}?t=${new Date().getTime()}`);
                const data = await res.json();
                const images = JSON.parse(b64_to_utf8(data.content));

                listDiv.innerHTML = images.length ? "" : "<p style='text-align:center;'>אין תמונות בקטגוריה זו</p>";
                images.forEach((img, index) => {
                    listDiv.innerHTML += `
                        <div class="image-item">
                            <img src="${img.src}" onerror="this.src='https://via.placeholder.com/60/111/c5a059?text=IMG'">
                            <div class="image-info">
                                <strong>${img.titleHe}</strong><br>
                                <small style="color:#666;">${img.src}</small>
                            </div>
                            <button class="delete-btn" onclick="deleteImage(${index})">מחק</button>
                        </div>
                    `;
                });
            } catch (e) { listDiv.innerHTML = "<p style='color:red;'>שגיאה בטעינה. וודא שקובץ ה-JSON קיים.</p>"; }
        }

        // מחיקה
        async function deleteImage(index) {
            if (!confirm("בטוח שברצונך למחוק את התמונה מהאתר?")) return;
            const token = localStorage.getItem('gh_token');
            const catFile = document.getElementById('manageCategory').value;
            const status = document.getElementById('status');

            status.style.display = "block";
            status.innerText = "מוחק ומעדכן...";
            status.style.background = "#333";

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                let images = JSON.parse(b64_to_utf8(data.content));
                images.splice(index, 1);

                const updateRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Delete image`, content: utf8_to_b64(JSON.stringify(images, null, 2)), sha: data.sha })
                });

                if(updateRes.ok) {
                    status.innerText = "נמחק! השינוי יופיע באתר תוך דקה.";
                    status.style.background = "#155724";
                    setTimeout(loadGalleryForManage, 800);
                }
            } catch (e) { alert("שגיאה: " + e.message); }
        }

        // העלאה
        async function startUpload() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt("הכנס GitHub Token (ghp_...):");
                if (token) localStorage.setItem('gh_token', token); else return;
            }

            const tHe = document.getElementById('titleHe').value;
            const tEn = document.getElementById('titleEn').value;
            const catFile = document.getElementById('category').value;
            const status = document.getElementById('status');

            if (!selectedFile || !tHe) return alert("מלא כותרת ובחר תמונה!");

            status.style.display = "block";
            status.innerText = "מעלה תמונה ומרענן רשימות...";
            status.style.background = "#333";

            const reader = new FileReader();
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];
                const fileName = selectedFile.name.replace(/\s+/g, '_');

                try {
                    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${fileName}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}` },
                        body: JSON.stringify({ message: `Add image`, content: base64Image })
                    });

                    const resJson = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    const jsonFileData = await resJson.json();
                    const currentImages = JSON.parse(b64_to_utf8(jsonFileData.content));
                    currentImages.push({ src: fileName, titleHe: tHe, titleEn: tEn });

                    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${catFile}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}` },
                        body: JSON.stringify({ message: `Update JSON`, content: utf8_to_b64(JSON.stringify(currentImages, null, 2)), sha: jsonFileData.sha })
                    });

                    status.innerText = "הצלחה! התמונה באוויר.";
                    status.style.background = "#155724";
                    document.getElementById('titleHe').value = ""; document.getElementById('titleEn').value = "";
                    document.getElementById('fileNameDisplay').innerText = "גרור תמונה לכאן או לחץ לבחירה";
                    selectedFile = null;
                } catch (e) { status.innerText = "שגיאה: " + e.message; status.style.background = "#721c24"; }
            };
            reader.readAsDataURL(selectedFile);
        }
    </script>
</body>
</html>
