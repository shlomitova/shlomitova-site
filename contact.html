<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; height: 100%; overflow: hidden; }
        .close-page { position: fixed; top: 30px; right: 40px; color: #fff; font-size: 45px; text-decoration: none; z-index: 1100; transition: 0.3s; }
        .close-page:hover { color: #c5a059; }
        .contact-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('white_fronted_goose.jpg') no-repeat center center; background-size: cover; }
        .contact-container { background: rgba(10, 10, 10, 0.8); padding: 40px; width: 90%; max-width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); outline: none; }
        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 10px; }
        h2 span { display: block; font-size: 0.8rem; color: #c5a059; letter-spacing: 3px; margin-top: 10px; }
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        input, textarea { background: transparent; border: none; border-bottom: 1px solid #444; padding: 10px; color: #fff; outline: none; font-family: inherit; }
        input:focus, textarea:focus { border-bottom-color: #c5a059; }
        button { background: #c5a059; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; letter-spacing: 2px; }
        button:hover { background: #fff; }
    </style>
</head>
<body>
    <a href="index.html" class="close-page">&times;</a>
    <section class="contact-page">
        <div class="contact-container" id="contact-box" tabindex="0">
            <h2>צור קשר<span>CONTACT</span></h2>
            <form action="https://formspree.io/f/xzdkaeqp" method="POST">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" placeholder="Message" rows="4" required></textarea>
                <button type="submit">SEND MESSAGE</button>
            </form>
        </div>
    </section>
    <script>
        window.addEventListener('DOMContentLoaded', () => document.getElementById('contact-box').focus());
        window.addEventListener('keyup', (e) => { if (e.key === "Escape") window.location.href = "index.html"; });
    </script>
</body>
</html>
