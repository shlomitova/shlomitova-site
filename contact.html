<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100%; overflow: hidden; }
        
        .close-page { 
            position: fixed; top: 30px; left: 40px; 
            color: #fff; font-size: 40px; text-decoration: none; z-index: 1000; transition: 0.3s; 
        }
        .close-page:hover { color: #c5a059; transform: scale(1.1); }

        .contact-page { 
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('ibex.jpg') no-repeat center center; 
            background-size: cover;
        }

        /* שאר העיצוב המקורי של הדף ללא שינוי */
        .contact-container { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; 
            text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); 
        }
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; 
            background: rgba(255,255,255,0.1); color: #fff; outline: none; 
        }
        button { 
            width: 100%; padding: 12px; border: none; border-radius: 5px; 
            background: #c5a059; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        button:hover { background: #e2be7e; }

        @media (max-width: 768px) {
            .contact-page { 
                background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('ibex.jpg') no-repeat center center;
                background-size: cover;
            }
            .contact-container { width: 85%; padding: 30px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-page">&times;</a>

    <section class="contact-page">
        <div class="contact-container">
            <h2>צור קשר</h2>
            <form>
                <input type="text" placeholder="שם מלא" required>
                <input type="email" placeholder="אימייל" required>
                <textarea placeholder="הודעה" rows="5" required></textarea>
                <button type="submit">שלח הודעה</button>
            </form>
        </div>
    </section>

    <script>
        window.addEventListener('keyup', (e) => {
            if (e.key === "Escape") {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
