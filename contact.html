<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Shlomi Tova</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; }
        
        .close-page { 
            position: fixed; top: 30px; left: 40px; /* ה-X עובר לשמאל כדי לא להפריע לגדי */
            color: #fff; font-size: 50px; text-decoration: none; z-index: 1100; transition: 0.3s; 
        }
        .close-page:hover { color: #c5a059; transform: scale(1.1); }

        .contact-page { 
            height: 100vh; display: flex; align-items: center; 
            justify-content: flex-end; /* בגלל ה-RTL, זה דוחף את המלבן לשמאל הפיזי של המסך */
            padding: 0 10%; 
            background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%), url('ibex.jpg') no-repeat right center; 
            background-size: cover; 
        }

        .contact-container { 
            background: rgba(10, 10, 10, 0.6); /* שקיפות משופרת */
            padding: 50px; width: 100%; max-width: 380px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.2); 
            backdrop-filter: blur(15px); /* אפקט זכוכית */
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            outline: none;
        }

        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 5px; font-size: 2.2rem; }
        h2 span { display: block; font-size: 0.8rem; color: #c5a059; letter-spacing: 3px; margin-top: 10px; }
        
        .gold-line { width: 40px; height: 1px; background: #c5a059; margin: 20px auto; }

        form { display: flex; flex-direction: column; gap: 20px; margin-top: 25px; }
        
        /* שדות טקסט - לבן בוהק במקום אפור */
        input, textarea { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); 
            padding: 15px; color: #fff; outline: none; font-family: inherit; transition: 0.3s;
            font-size: 1.1rem;
        }
        
        /* צבע הטקסט המקדים (Placeholder) - לבן לגמרי */
        ::placeholder { color: #ffffff !important; opacity: 1; }
        ::-webkit-input-placeholder { color: #ffffff !important; opacity: 1; }
        
        input:focus, textarea:focus { border-color: #c5a059; background: rgba(255,255,255,0.1); }
        
        button { 
            background: #c5a059; color: #000; border: none; padding: 18px; 
            cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; 
            letter-spacing: 2px; text-transform: uppercase;
        }
        button:hover { background: #fff; color: #000; }

        @media (max-width: 768px) {
            .contact-page { justify-content: center; padding: 0 5%; }
            .contact-container { max-width: 90%; background: rgba(10, 10, 10, 0.8); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="close-page">&times;</a>

    <section class="contact-page">
        <div class="contact-container" id="contact-box" tabindex="0">
            <h2>צור קשר<span>CONTACT</span></h2>
            <div class="gold-line"></div>
            
            <form action="https://formspree.io/f/xzdkaeqp" method="POST">
                <input type="text" name="name" placeholder="Name / שם" required>
                <input type="email" name="email" placeholder="Email / אימייל" required>
                <textarea name="message" placeholder="Message / הודעה" rows="4" required></textarea>
                <button type="submit">SEND MESSAGE</button>
            </form>
        </div>
    </section>

    <script>
        window.addEventListener('DOMContentLoaded', () => document.getElementById('contact-box').focus());
        window.addEventListener('keyup', (e) => { if (e.key === "Escape") window.location.href = "index.html"; });
    </script>
</body>
</html>
